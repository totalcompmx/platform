name: Platform CI and GHCR Publish

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag override"
        required: false
        type: string

concurrency:
  group: platform-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_REGISTRY: ghcr.io
  GHCR_NAMESPACE: ${{ vars.GHCR_NAMESPACE || github.repository_owner }}
  IMAGE_NAME: totalcomp
  DOCKER_METADATA_SHORT_SHA_LENGTH: 12

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run unit tests
        run: make test

  publish-image:
    name: Publish Image
    needs:
      - unit-tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize package namespace
        id: registry
        env:
          RAW_NAMESPACE: ${{ env.GHCR_NAMESPACE }}
        run: |
          echo "namespace=$(printf '%s' "${RAW_NAMESPACE}" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Plain shell instead of docker/metadata-action: the action's GitHub API
      # call for repo metadata was returning persistent server-side errors,
      # and all we need are two deterministic tag strings.
      - name: Generate Docker metadata
        id: meta
        env:
          NAMESPACE: ${{ steps.registry.outputs.namespace }}
          IS_DEFAULT_BRANCH: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
          TAG_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
        run: |
          image="${IMAGE_REGISTRY}/${NAMESPACE}/${IMAGE_NAME}"
          short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-${DOCKER_METADATA_SHORT_SHA_LENGTH})"
          tags="${image}:sha-${short_sha}"
          if [ "${IS_DEFAULT_BRANCH}" = "true" ]; then
            tags="${tags},${image}:latest"
          fi
          if [ -n "${TAG_OVERRIDE}" ]; then
            tags="${tags},${image}:${TAG_OVERRIDE}"
          fi
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=totalcomp
          cache-to: type=gha,mode=max,scope=totalcomp

  update-helm-chart:
    name: Pin Helm Chart Image
    needs:
      - publish-image
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate Helm chart token
        env:
          HELM_CHARTS_TOKEN: ${{ secrets.HELM_CHARTS_TOKEN }}
        run: |
          if [ -z "${HELM_CHARTS_TOKEN}" ]; then
            echo "::error::Set HELM_CHARTS_TOKEN to a token with contents:write access to totalcompmx/helm-charts."
            exit 1
          fi

      - name: Checkout Helm chart repository
        uses: actions/checkout@v6
        with:
          repository: totalcompmx/helm-charts
          token: ${{ secrets.HELM_CHARTS_TOKEN }}
          path: helm-charts

      - name: Pin chart image tag
        working-directory: helm-charts
        env:
          GIT_SHA: ${{ github.sha }}
          TAG_OVERRIDE: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "${TAG_OVERRIDE}" ]; then
            image_tag="${TAG_OVERRIDE}"
          else
            image_tag="sha-$(printf '%s' "${GIT_SHA}" | cut -c1-12)"
          fi

          IMAGE_TAG="${image_tag}" perl -0pi -e 's/(^image:\n(?:  .*\n)*?  tag:\s*)"?[^"\n]+"?/${1}"$ENV{IMAGE_TAG}"/m' totalcomp/values.yaml

          if git diff --quiet -- totalcomp/values.yaml; then
            echo "Helm chart already pins ${image_tag}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add totalcomp/values.yaml
          git commit -m "chore: pin totalcomp image to ${image_tag} [skip ci]"
          git push
