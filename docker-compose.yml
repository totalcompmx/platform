services:
  postgres:
    image: postgres:16-alpine
    container_name: compensacion-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-compensacion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-temp123}
      POSTGRES_DB: ${POSTGRES_DB:-compensacion}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compensacion-app
    ports:
      # For LOCAL development:
      - "127.0.0.1:${HTTP_PORT:-3080}:3080"
      # For PRODUCTION (Auto HTTPS), also expose these:
      # - "80:80"    # HTTP (redirects to HTTPS)
      # - "443:443"  # HTTPS
    environment:
      # For LOCAL development (HTTP only):
      - BASE_URL=http://localhost:3080
      - HTTP_PORT=3080
      # For PRODUCTION with totalcomp.mx (Auto HTTPS with Let's Encrypt):
      # Uncomment these 3 lines when deploying:
      # - AUTO_HTTPS_DOMAIN=totalcomp.mx
      # - AUTO_HTTPS_EMAIL=jcroyoaun@gmail.com
      # - AUTO_HTTPS_STAGING=false
      # Database configuration (the app reads these individual vars, not DATABASE_URL)
      - DB_HOST=postgres
      - DB_USER=${POSTGRES_USER:-compensacion}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-temp123}
      - DB_NAME=${POSTGRES_DB:-compensacion}
      - DB_SSLMODE=disable
      - DB_AUTOMIGRATE=true
      # Session & Security
      - COOKIE_SECRET_KEY=${COOKIE_SECRET_KEY}
      - COOKIE_SECURE=false
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME:-session_totalcompmx}
      # Email settings via Resend (optional - only needed for emails)
      - RESEND_API_KEY=
      # External API tokens (REQUIRED for ETL worker)
      # Get Banxico token: https://www.banxico.org.mx/SieAPIRest/service/v1/token
      # Get INEGI token: https://www.inegi.org.mx/app/api/registrar.html
      - BANXICO_TOKEN=
      - INEGI_TOKEN=
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
